name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore EmbeddedCommitLog.sln

      - name: Build
        run: dotnet build EmbeddedCommitLog.sln --no-restore -warnaserror

      - name: Detect test projects
        id: detect-tests
        run: |
          count=$(find . -name "*.Tests.csproj" -not -path "*/obj/*" | wc -l)
          echo "has_tests=$([ "$count" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Run tests
        if: steps.detect-tests.outputs.has_tests == 'true'
        run: |
          dotnet run --project tests/ByTech.EmbeddedCommitLog.Tests \
            -- --report-trx --results-directory ./TestResults

      - name: Upload test results
        if: steps.detect-tests.outputs.has_tests == 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: ./TestResults/*.trx
